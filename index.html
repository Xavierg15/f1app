<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e10600">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="F1 2026">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>F1 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  /* ── Reset & base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:      #e10600;
    --red-dim:  #7a0300;
    --bg:       #080808;
    --bg2:      #111;
    --bg3:      #181818;
    --border:   #222;
    --text:     #f0f0f0;
    --muted:    #555;
    --gold:     #f0c040;
    --safe-top: env(safe-area-inset-top);
    --safe-bot: env(safe-area-inset-bottom);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    height: 100%;
    overflow: hidden;
  }

  /* ── Layout shell ─────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }

  /* ── Header ───────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
    background: linear-gradient(180deg, #0f0f0f 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 10px;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .logo-f1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--red);
    letter-spacing: -1px;
    line-height: 1;
  }
  .logo-year {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .sync-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .sync-btn:active { background: #b00500; }
  .sync-btn.syncing { background: #333; color: #666; pointer-events: none; }

  .notif-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.2s;
  }
  .notif-btn.active { border-color: var(--red); }

  /* ── Progress bar ─────────────────────────────────────────── */
  .progress-bar {
    height: 2px;
    background: var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--red);
    transition: width 0.3s;
  }
  .progress-bar-fill.indeterminate {
    width: 40%;
    animation: slide 1.2s infinite ease-in-out;
  }
  @keyframes slide {
    0%   { transform: translateX(-200%); }
    100% { transform: translateX(350%); }
  }

  /* ── Stat strip ───────────────────────────────────────────── */
  .stat-strip {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .stat-strip::-webkit-scrollbar { display: none; }

  .stat-card {
    flex: 1;
    min-width: 100px;
    padding: 10px 14px;
    border-right: 1px solid var(--border);
    background: var(--bg2);
  }
  .stat-card:last-child { border-right: none; }
  .stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--red);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stat-lbl {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 2px;
    white-space: nowrap;
  }

  /* ── Tab bar ──────────────────────────────────────────────── */
  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 12px 4px;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .tab.active {
    color: var(--text);
    border-bottom-color: var(--red);
  }

  /* ── Tab panels ───────────────────────────────────────────── */
  .panels { flex: 1; overflow: hidden; position: relative; }

  .panel {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    display: none;
    padding-bottom: 16px;
  }
  .panel.active { display: block; }

  /* ── Table ────────────────────────────────────────────────── */
  .f1-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .f1-table thead th {
    position: sticky;
    top: 0;
    background: var(--bg2);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    z-index: 2;
  }
  .f1-table tbody tr {
    border-bottom: 1px solid #141414;
    transition: background 0.1s;
  }
  .f1-table tbody tr:active { background: #1c1c1c; }
  .f1-table td {
    padding: 10px 10px;
    vertical-align: middle;
  }
  .f1-table .num {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    width: 32px;
  }
  .f1-table .pts {
    text-align: right;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: var(--gold);
    white-space: nowrap;
  }
  .f1-table .center { text-align: center; }

  .driver-name {
    font-weight: 600;
    font-size: 14px;
    line-height: 1.2;
  }
  .driver-team {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .team-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 5px;
    flex-shrink: 0;
  }

  .medal { font-size: 16px; }

  .dnf { opacity: 0.35; }
  .fl-badge {
    display: inline-block;
    background: #6200ea22;
    color: #ce93d8;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    font-weight: 700;
  }

  /* ── Round selector ───────────────────────────────────────── */
  .round-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    position: sticky;
    top: 0;
    z-index: 3;
  }
  .round-select {
    flex: 1;
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    -webkit-appearance: none;
  }
  .round-nav {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  /* ── Calendar status ──────────────────────────────────────── */
  .badge {
    display: inline-block;
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.5px;
  }
  .badge-done   { background: #1a3a1a; color: #4caf50; }
  .badge-next   { background: #3a1a00; color: #ff8c00; }
  .badge-sprint { background: #1a1040; color: #9c7cff; }
  .badge-upcoming { color: var(--muted); font-size: 11px; }

  /* ── Status bar ───────────────────────────────────────────── */
  .status-bar {
    font-size: 11px;
    color: var(--muted);
    padding: 6px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 28px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .status-dot.green { background: #4caf50; }
  .status-dot.red   { background: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Toast ────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: calc(60px + var(--safe-bot));
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1e1e1e;
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    max-width: 320px;
    width: calc(100vw - 32px);
    text-align: center;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Empty state ──────────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 60px 30px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  /* ── Skeleton loader ──────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <span class="logo-f1">F1</span>
      <span class="logo-year">2026</span>
    </div>
    <div class="header-right">
      <button class="notif-btn" id="notifBtn" title="Enable notifications">🔔</button>
      <button class="sync-btn" id="syncBtn" onclick="syncNow()">
        <span id="syncIcon">⟳</span> Sync
      </button>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>

  <!-- Stat strip -->
  <div class="stat-strip" id="statStrip">
    <div class="stat-card"><div class="stat-val" id="statLeader">—</div><div class="stat-lbl">Leader</div></div>
    <div class="stat-card"><div class="stat-val" id="statPts">—</div><div class="stat-lbl">Points</div></div>
    <div class="stat-card"><div class="stat-val" id="statRounds">— / 24</div><div class="stat-lbl">Rounds</div></div>
    <div class="stat-card"><div class="stat-val" id="statNext">—</div><div class="stat-lbl">Next Race</div></div>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar">
    <div class="tab active" data-tab="drivers">🏆 Drivers</div>
    <div class="tab" data-tab="teams">🏗 Teams</div>
    <div class="tab" data-tab="results">🏁 Results</div>
    <div class="tab" data-tab="calendar">📅 Calendar</div>
  </div>

  <!-- Panels -->
  <div class="panels">
    <div class="panel active" id="panel-drivers">
      <table class="f1-table" id="driverTable">
        <thead><tr>
          <th class="num">Pos</th>
          <th>Driver</th>
          <th style="text-align:right">Pts</th>
          <th class="center">W</th>
        </tr></thead>
        <tbody id="driverBody"></tbody>
      </table>
    </div>

    <div class="panel" id="panel-teams">
      <table class="f1-table" id="teamTable">
        <thead><tr>
          <th class="num">Pos</th>
          <th>Constructor</th>
          <th style="text-align:right">Pts</th>
          <th class="center">W</th>
        </tr></thead>
        <tbody id="teamBody"></tbody>
      </table>
    </div>

    <div class="panel" id="panel-results">
      <div class="round-bar">
        <button class="round-nav" id="prevRound">‹</button>
        <select class="round-select" id="roundSelect"></select>
        <button class="round-nav" id="nextRound">›</button>
      </div>
      <table class="f1-table">
        <thead><tr>
          <th class="num">Pos</th>
          <th>Driver</th>
          <th style="text-align:right">Gap</th>
          <th class="center">Pts</th>
        </tr></thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>

    <div class="panel" id="panel-calendar">
      <table class="f1-table">
        <thead><tr>
          <th class="num">Rnd</th>
          <th>Grand Prix</th>
          <th style="text-align:right">Date</th>
        </tr></thead>
        <tbody id="calendarBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Loading…</span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const API   = "https://api.jolpi.ca/ergast/f1/2026";
const SEASON = 2026;

// ── Team colours ──────────────────────────────────────────────────────────
const TEAM_COLORS = {
  "McLaren":       "#FF8000",
  "Ferrari":       "#DC0000",
  "Mercedes":      "#27F4D2",
  "Red Bull":      "#3671C6",
  "Williams":      "#64C4FF",
  "Aston Martin":  "#358C75",
  "Alpine":        "#FF87BC",
  "Haas":          "#B0B0B0",
  "RB":            "#6692FF",
  "Audi":          "#FF2D55",
  "Cadillac":      "#4A90D9",
};

function teamColor(name) {
  for (const [k, v] of Object.entries(TEAM_COLORS))
    if (name && name.includes(k)) return v;
  return "#888";
}

// ── State ─────────────────────────────────────────────────────────────────
let state = {
  driverStandings: [],
  constructorStandings: [],
  calendar: [],
  raceResults: {},   // round → results array
  currentRound: 1,
  lastSync: null,
  syncing: false,
  notificationsEnabled: false,
  watchInterval: null,
};

// ── API helpers ───────────────────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(`${API}/${path}`, { cache: "no-store" });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return (await r.json()).MRData;
}

// ── Sync all data ─────────────────────────────────────────────────────────
async function syncNow() {
  if (state.syncing) return;
  setSyncing(true);
  setStatus("Syncing with Jolpica API…", "red");
  try {
    await Promise.all([
      loadDriverStandings(),
      loadConstructorStandings(),
      loadCalendar(),
    ]);
    // Load latest race results
    const latestRound = state.calendar.filter(r => r.hasResult).length;
    if (latestRound > 0) {
      await loadRaceResults(latestRound);
      // Check if new since last sync
      const key = `f1_seen_r${latestRound}`;
      const wasNew = !localStorage.getItem(key);
      if (wasNew) {
        localStorage.setItem(key, "1");
        const race = state.calendar.find(r => r.round == latestRound);
        if (race && wasNew && state.lastSync) {
          pushNotification(`🏁 ${race.name} results are in!`,
            "Tap to see standings & results.");
        }
      }
    }
    updateAllViews();
    state.lastSync = new Date();
    const t = state.lastSync.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    setStatus(`Synced at ${t}`, "green");
    showToast("✓ Data updated");
  } catch(e) {
    setStatus(`Sync failed: ${e.message}`, "");
    showToast("⚠ Sync failed — check connection");
  } finally {
    setSyncing(false);
  }
}

async function loadDriverStandings() {
  const d = await apiFetch(`driverStandings.json`);
  state.driverStandings = d?.StandingsTable?.StandingsLists?.[0]?.DriverStandings ?? [];
}

async function loadConstructorStandings() {
  const d = await apiFetch(`constructorStandings.json`);
  state.constructorStandings = d?.StandingsTable?.StandingsLists?.[0]?.ConstructorStandings ?? [];
}

async function loadCalendar() {
  const d = await apiFetch(`races.json?limit=30`);
  const races = d?.RaceTable?.Races ?? [];
  // Check which rounds have results
  const resultsData = await apiFetch(`results.json?limit=50`);
  const doneRounds = new Set((resultsData?.RaceTable?.Races ?? []).map(r => parseInt(r.round)));

  state.calendar = races.map(r => ({
    round:    parseInt(r.round),
    name:     r.raceName,
    circuit:  r.Circuit?.circuitName ?? "",
    country:  r.Circuit?.Location?.country ?? "",
    date:     r.date,
    isSprint: !!r.Sprint,
    hasResult: doneRounds.has(parseInt(r.round)),
  }));
}

async function loadRaceResults(round) {
  if (state.raceResults[round]) return; // cached
  const d = await apiFetch(`${round}/results.json?limit=25`);
  const races = d?.RaceTable?.Races ?? [];
  state.raceResults[round] = races[0]?.Results ?? [];
}

// ── Render ────────────────────────────────────────────────────────────────
const MEDALS = {1:"🥇", 2:"🥈", 3:"🥉"};

function updateAllViews() {
  renderStats();
  renderDrivers();
  renderTeams();
  renderCalendar();
  renderRoundSelect();
  renderResults(state.currentRound);
}

function renderStats() {
  const d = state.driverStandings[0];
  if (d) {
    const last = d.Driver.familyName;
    document.getElementById("statLeader").textContent = last;
    document.getElementById("statPts").textContent = d.points + " pts";
  }
  const done  = state.calendar.filter(r => r.hasResult).length;
  document.getElementById("statRounds").textContent = `${done} / ${state.calendar.length || 24}`;
  const next = state.calendar.find(r => !r.hasResult);
  if (next) {
    document.getElementById("statNext").textContent = `R${next.round}`;
  }
}

function renderDrivers() {
  const body = document.getElementById("driverBody");
  if (!state.driverStandings.length) {
    body.innerHTML = `<tr><td colspan="4"><div class="empty"><div class="empty-icon">🏎</div><div class="empty-text">No standings yet.<br>Tap Sync to load data.</div></div></td></tr>`;
    return;
  }
  body.innerHTML = state.driverStandings.map((s, i) => {
    const pos  = i + 1;
    const col  = teamColor(s.Constructors?.[0]?.name ?? "");
    const team = s.Constructors?.[0]?.name ?? "";
    return `<tr>
      <td class="num">${MEDALS[pos] ?? pos}</td>
      <td>
        <div class="driver-name">${s.Driver.givenName[0]}. ${s.Driver.familyName}</div>
        <div class="driver-team">
          <span class="team-dot" style="background:${col}"></span>${team}
        </div>
      </td>
      <td class="pts">${s.points}</td>
      <td class="center" style="color:var(--muted);font-size:13px">${s.wins}</td>
    </tr>`;
  }).join("");
}

function renderTeams() {
  const body = document.getElementById("teamBody");
  if (!state.constructorStandings.length) {
    body.innerHTML = `<tr><td colspan="4"><div class="empty"><div class="empty-icon">🏗</div><div class="empty-text">Tap Sync to load data.</div></div></td></tr>`;
    return;
  }
  body.innerHTML = state.constructorStandings.map((s, i) => {
    const pos = i + 1;
    const col = teamColor(s.Constructor.name);
    return `<tr>
      <td class="num">${MEDALS[pos] ?? pos}</td>
      <td>
        <div class="driver-name" style="color:${col}">${s.Constructor.name}</div>
      </td>
      <td class="pts">${s.points}</td>
      <td class="center" style="color:var(--muted);font-size:13px">${s.wins}</td>
    </tr>`;
  }).join("");
}

function renderCalendar() {
  const body = document.getElementById("calendarBody");
  const today = new Date().toISOString().slice(0, 10);
  body.innerHTML = state.calendar.map(r => {
    let badge = "";
    if (r.hasResult)      badge = `<span class="badge badge-done">✓ Done</span>`;
    else if (r.date === today) badge = `<span class="badge badge-next">Today</span>`;
    else if (r.isSprint)  badge = `<span class="badge badge-sprint">Sprint</span>`;
    else                  badge = `<span class="badge-upcoming">${r.date}</span>`;

    const dateShort = r.date?.slice(5).replace("-", "/");
    return `<tr>
      <td class="num" style="color:var(--muted)">${r.round}</td>
      <td>
        <div style="font-weight:600;font-size:13px">${r.name.replace(" Grand Prix","")}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${r.country} ${r.isSprint ? "· 🏃" : ""}</div>
      </td>
      <td style="text-align:right;vertical-align:middle">${badge}</td>
    </tr>`;
  }).join("");
}

function renderRoundSelect() {
  const sel = document.getElementById("roundSelect");
  const prev = sel.value;
  sel.innerHTML = state.calendar.map(r => {
    const label = `R${r.round} — ${r.name.replace(" Grand Prix","")}${r.hasResult ? " ✓" : ""}`;
    return `<option value="${r.round}" ${r.round == prev ? "selected" : ""}>${label}</option>`;
  }).join("");
  if (!prev && state.calendar.length) {
    // Default to last completed round
    const done = state.calendar.filter(r => r.hasResult);
    if (done.length) {
      sel.value = done[done.length - 1].round;
      state.currentRound = done[done.length - 1].round;
    }
  }
}

async function renderResults(round) {
  if (!round) return;
  const body = document.getElementById("resultsBody");
  body.innerHTML = `<tr><td colspan="4" style="padding:20px;text-align:center;color:var(--muted)">Loading…</td></tr>`;

  try {
    await loadRaceResults(round);
    const results = state.raceResults[round] ?? [];
    if (!results.length) {
      body.innerHTML = `<tr><td colspan="4"><div class="empty"><div class="empty-icon">🏁</div><div class="empty-text">No results yet for this round.</div></div></td></tr>`;
      return;
    }
    body.innerHTML = results.map(r => {
      const pos    = parseInt(r.position);
      const dnf    = !["Finished"].includes(r.status) && !r.status.includes("Lap");
      const col    = teamColor(r.Constructor?.name ?? "");
      const fl     = parseInt(r.FastestLap?.rank) === 1;
      const gap    = pos === 1 ? (r.Time?.time ?? "—")
                   : r.status.includes("Lap") ? r.status
                   : r.Time ? `+${r.Time.time}` : r.status;

      return `<tr class="${dnf ? "dnf" : ""}">
        <td class="num">${MEDALS[pos] ?? pos}</td>
        <td>
          <div class="driver-name">
            ${r.Driver.givenName[0]}. ${r.Driver.familyName}
            ${fl ? '<span class="fl-badge">FL</span>' : ""}
          </div>
          <div class="driver-team">
            <span class="team-dot" style="background:${col}"></span>${r.Constructor?.name ?? ""}
          </div>
        </td>
        <td style="text-align:right;font-size:12px;color:var(--muted);vertical-align:middle">${gap}</td>
        <td class="pts" style="font-size:14px">${r.points}</td>
      </tr>`;
    }).join("");
  } catch(e) {
    body.innerHTML = `<tr><td colspan="4" style="padding:20px;text-align:center;color:var(--muted)">Failed to load results.</td></tr>`;
  }
}

// ── Tab switching ─────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(`panel-${tab.dataset.tab}`).classList.add("active");
  });
});

// ── Round navigation ──────────────────────────────────────────────────────
document.getElementById("roundSelect").addEventListener("change", e => {
  state.currentRound = parseInt(e.target.value);
  renderResults(state.currentRound);
});
document.getElementById("prevRound").addEventListener("click", () => {
  const sel = document.getElementById("roundSelect");
  const idx = sel.selectedIndex;
  if (idx > 0) { sel.selectedIndex = idx - 1; sel.dispatchEvent(new Event("change")); }
});
document.getElementById("nextRound").addEventListener("click", () => {
  const sel = document.getElementById("roundSelect");
  const idx = sel.selectedIndex;
  if (idx < sel.options.length - 1) { sel.selectedIndex = idx + 1; sel.dispatchEvent(new Event("change")); }
});

// ── UI helpers ────────────────────────────────────────────────────────────
function setSyncing(v) {
  state.syncing = v;
  const btn  = document.getElementById("syncBtn");
  const fill = document.getElementById("progressFill");
  btn.classList.toggle("syncing", v);
  btn.querySelector("#syncIcon").textContent = v ? "…" : "⟳";
  fill.classList.toggle("indeterminate", v);
}

function setStatus(msg, dot) {
  document.getElementById("statusText").textContent = msg;
  const d = document.getElementById("statusDot");
  d.className = "status-dot" + (dot ? " " + dot : "");
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

// ── Notifications ─────────────────────────────────────────────────────────
async function requestNotifications() {
  if (!("Notification" in window)) {
    showToast("Notifications not supported on this browser");
    return;
  }
  const perm = await Notification.requestPermission();
  state.notificationsEnabled = perm === "granted";
  document.getElementById("notifBtn").classList.toggle("active", state.notificationsEnabled);
  if (state.notificationsEnabled) {
    showToast("🔔 Notifications enabled!");
    startWatchMode();
  } else {
    showToast("Notifications blocked — check Safari settings");
  }
}

function pushNotification(title, body) {
  if (!state.notificationsEnabled) return;
  try {
    new Notification(title, { body, icon: "./icon-192.png" });
  } catch(e) {
    // Silently fail if blocked
  }
}

document.getElementById("notifBtn").addEventListener("click", async () => {
  if (state.notificationsEnabled) {
    stopWatchMode();
    state.notificationsEnabled = false;
    document.getElementById("notifBtn").classList.remove("active");
    showToast("🔕 Notifications off");
  } else {
    await requestNotifications();
  }
});

// ── Watch mode (poll every 10 min) ────────────────────────────────────────
function startWatchMode() {
  if (state.watchInterval) return;
  state.watchInterval = setInterval(syncNow, 10 * 60 * 1000);
  setStatus("Watch mode ON — syncing every 10 min", "green");
}

function stopWatchMode() {
  clearInterval(state.watchInterval);
  state.watchInterval = null;
}

// ── Service worker ────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").then(reg => {
    // Request periodic background sync if available
    if ("periodicSync" in reg) {
      navigator.permissions.query({ name: "periodic-background-sync" }).then(status => {
        if (status.state === "granted") {
          reg.periodicSync.register("f1-sync", { minInterval: 10 * 60 * 1000 });
        }
      });
    }
  });

  // Listen for messages from SW
  navigator.serviceWorker.addEventListener("message", e => {
    if (e.data?.type === "OPEN_ROUND") {
      const rnd = e.data.round;
      state.currentRound = rnd;
      document.querySelector("[data-tab='results']").click();
      renderResults(rnd);
    }
  });
}

// ── Check notification permission on load ─────────────────────────────────
if (Notification.permission === "granted") {
  state.notificationsEnabled = true;
  document.getElementById("notifBtn").classList.add("active");
  startWatchMode();
}

// ── Boot ──────────────────────────────────────────────────────────────────
(async () => {
  setStatus("Loading data…", "red");
  await syncNow();

  // Show install prompt hint if not already installed
  if (!window.matchMedia("(display-mode: standalone)").matches) {
    setTimeout(() => {
      showToast("💡 Add to Home Screen for app experience");
    }, 3500);
  }
})();
</script>
</body>
</html>
